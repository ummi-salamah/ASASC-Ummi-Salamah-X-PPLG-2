<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dior - Produk</title>  
  <style>
    body{
      background-color: #fff;
      font-family: Georgia, serif;
      text-align: center;
      margin: 0;
    }

    .navbar{
      background-color: white;
      padding: 15px;
      border-bottom: 1px solid #eee;
      font-size: 24px;
      letter-spacing: 6px;
      font-weight: bold;
    }

    .banner {
      background-color: #fce8e8;
      padding: 40px;   
    }

    .produk {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 30px;
    }

    .letak {
      background-color: white;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 15px;
      width: 160px;
    }

    .img {
      width: 20px;
      height: 30px;
      object-fit: cover;
      border-radius: 5px;
    }

    .h3 {
      font-size: 13px;
      margin: 8px 0 4px;
    }

    .harga {
      color: #b07080;
      font-weight: bold;
      font-size: 13px;
    }

    .jumlah {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    input[type="number"] {
      width: 60px;
      padding: 5px;
      border: 1px solid #ddd;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      margin-top: 6px;
    }

    .tombol {
      display: inline-block;
      background-color: #b07080;
      color: white;
      padding: 12px 40px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      margin: 10px auto 40px;
    }
  </style>
</head>
<body>
  <div class="navbar">DIOR</div>
  <div class="banner">
    <h2>Dior Parfums</h2>
    <p style="color:#888;">Temukan aroma terbaik untuk dirimu</p>
  </div>

  <h2>Produk Kami</h2>
  <div class="produk">
    <div class="">
      <img src="miss dior.jpeg" alt="Miss Dior">
      <h3>Miss Dior</h3>
      <p class="harga">Rp 1.850.000</p>
      <p class="jumlah">Jumlah:</p>
      <input type="number" min="0" value="0">
    </div>
    <div class="">
      <img src="miss dior ke2.jpeg" alt="Miss Dior Blooming">
      <h3>Miss Dior Blooming</h3>
      <p class="harga">Rp 1.650.000</p>
      <p class="jumlah">Jumlah:</p>
      <input type="number" min="0" value="0">
    </div>
    <div class="">
      <img src="j'adore.jpeg" alt="J'adore">
      <h3>J'adore EDP</h3>
      <p class="harga">Rp 3.000.000</p>
      <p class="jumlah">Jumlah:</p>
      <input type="number" min="0" value="0">
    </div>
    <div class="">
      <img src="dior addict.jpeg" alt="Dior Addict">
      <h3>Dior Addict</h3>
      <p class="harga">Rp 3.016.000</p>
      <p class="jumlah">Jumlah:</p>
      <input type="number" min="0" value="0">
    </div>
    <div class="">
      <img src="dior hyptonic.jpeg" alt="Hypnotic Poison">
      <h3>Hypnotic Poison</h3>
      <p class="harga">Rp 2.750.000</p>
      <p class="jumlah">Jumlah:</p>
      <input type="number" min="0" value="0">
    </div>

  </div>

  <a class="tombol" href="proses akhir.html" onclick="
  var q=[];
  var inp=document.querySelectorAll('input[type=number]');
  for(var i=0;i<inp.length;i++) q.push(Number(inp[i].value));
  localStorage.setItem('pesanan', JSON.stringify(q));
">LANJUT KE PEMBAYARAN</a>
</body>
</html>
